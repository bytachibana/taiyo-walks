name: Process Walks

# Runs whenever a new/updated GPX file is pushed into walks/.
# Regenerates progress.json and commits it back to the repo.
on:
  push:
    branches: [main]
    paths:
      - 'walks/**'

# Needed so the workflow can commit progress.json back with GITHUB_TOKEN.
permissions:
  contents: write

# A burst of walk pushes (several files dropped at once) would otherwise start
# several racing runs. Cancel superseded in-progress runs so only the latest —
# which sees every walk — runs to completion.
concurrency:
  group: process-walks
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install shapely

      - name: Process walks
        run: python process_walks.py

      - name: Commit updated progress.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # If the Apps Script pushes another walk while this run is committing,
          # the push is rejected (non-fast-forward). On rejection, drop our
          # commit, sync to the latest remote (which now has the newer walk),
          # regenerate progress.json against it, and retry.
          for attempt in 1 2 3 4 5; do
            git add progress.json
            if git diff --staged --quiet; then
              echo "progress.json unchanged — nothing to commit."
              exit 0
            fi
            git commit -m "Update progress.json [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (remote advanced) — syncing and regenerating (attempt $attempt)..."
            git reset --hard HEAD~1
            git fetch origin main
            git reset --hard origin/main
            python process_walks.py
          done
          echo "Still failing to push after 5 attempts."
          exit 1
