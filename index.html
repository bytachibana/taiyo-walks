<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Taiyo's Danville Walk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
  --text:#e8e9f0;--muted:#7a7d8e;
  --walked:#4ade9a;--accent:#f0a500;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{
  height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);
  overflow:hidden;                      /* app-style: only inner panes scroll */
  overscroll-behavior:none;             /* no rubber-band / pull-to-refresh */
  -webkit-text-size-adjust:100%;        /* iOS: don't inflate text on rotate */
  -webkit-tap-highlight-color:transparent;
}
button{touch-action:manipulation}       /* kill the 300ms tap delay */

/* Header */
header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:10px}
.site-title{font-weight:600;font-size:15px;letter-spacing:.02em}
.site-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}
.hprog{display:flex;align-items:center;gap:12px}
.pct-lbl{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--walked);line-height:1}
.pct-sub{font-size:10px;color:var(--muted);text-align:right;line-height:1.6}
.bar-wrap{width:140px;height:4px;background:var(--border);border-radius:2px}
.bar-fill{height:100%;background:var(--walked);border-radius:2px;transition:width 1.2s ease;width:0%}

/* Layout */
.layout{display:flex;height:calc(100vh - 52px);margin-top:52px}
/* Mobile browsers shrink/grow the address bar, so 100vh overflows and the
   filmstrip gets pushed off-screen. dvh tracks the *visible* viewport. */
@supports (height:100dvh){.layout{height:calc(100dvh - 52px)}}
.sidebar{
  width:268px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;
}
.sb{padding:16px;border-bottom:1px solid var(--border)}
.sb-lbl{
  font-family:var(--mono);font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px;
}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbox{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.sval{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1}
.sval.g{color:var(--walked)}
.sunit{font-size:10px;color:var(--muted);margin-top:3px}
.witem{
  padding:9px 11px;border-radius:6px;cursor:pointer;
  border:1px solid transparent;margin-bottom:5px;transition:all .15s;
}
.witem:hover{background:var(--bg);border-color:var(--border)}
.witem.active{background:var(--bg);border-color:var(--accent)}
.wname{font-size:12px;font-weight:600}
.wmeta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.toggles{display:flex;gap:6px;flex-wrap:wrap}
.tbtn{
  font-family:var(--mono);font-size:10px;padding:5px 10px;
  border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
}
.tbtn.on{background:var(--bg);border-color:var(--accent);color:var(--accent)}
.legend{display:flex;flex-direction:column;gap:8px}
.litem{display:flex;align-items:center;gap:8px;font-size:12px}
.lline{width:24px;height:3px;border-radius:2px;flex-shrink:0}

/* Loading overlay */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  font-family:var(--mono);font-size:13px;color:var(--muted);
}
.spinner{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--walked);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error box */
#errBox{
  display:none;background:#2a1a1a;border:1px solid #5a2020;
  border-radius:8px;padding:16px 20px;max-width:480px;
  font-family:var(--mono);font-size:12px;color:#ff8080;line-height:1.6;
}

/* Map */
#map{flex:1}
.leaflet-container{background:#0f1117}
.leaflet-tile{filter:brightness(.65) saturate(.35)}
.leaflet-popup-content-wrapper{
  background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  font-family:var(--sans);font-size:13px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.leaflet-popup-tip{background:var(--surface)}
.pu-name{font-weight:600;margin-bottom:4px}
.pu-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
.pu-yes{color:var(--walked);font-weight:600}

/* Photo gallery — bottom filmstrip, map pins, lightbox */
.mainarea{flex:1;display:flex;flex-direction:column;min-width:0}
.filmstrip{
  height:118px;flex-shrink:0;display:flex;gap:8px;align-items:center;
  padding:0 12px;overflow-x:auto;overflow-y:hidden;
  background:var(--surface);border-top:1px solid var(--border);
  -webkit-overflow-scrolling:touch;     /* iOS momentum scrolling */
  scroll-snap-type:x proximity;
  overscroll-behavior-x:contain;        /* don't trigger back-swipe navigation */
  padding-bottom:env(safe-area-inset-bottom);   /* clear iPhone home indicator */
}
.filmstrip:empty{display:none}
.pthumb{
  height:92px;width:auto;flex-shrink:0;border-radius:6px;cursor:pointer;
  object-fit:cover;border:2px solid transparent;scroll-snap-align:center;
  transition:border-color .15s,transform .15s;
}
.pthumb:hover{border-color:var(--accent);transform:translateY(-2px)}
.photopin img{
  width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;
  border:2px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.55);
}
#lightbox{
  display:none;position:fixed;inset:0;z-index:2000;cursor:zoom-out;
  background:rgba(8,9,13,.93);flex-direction:column;gap:14px;
  align-items:center;justify-content:center;
  padding:max(24px,env(safe-area-inset-top)) 20px max(24px,env(safe-area-inset-bottom));
}
#lbImg{max-width:92vw;max-height:78vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#lbCap{font-family:var(--mono);font-size:12px;color:var(--muted)}
.lb-close{
  position:absolute;top:max(12px,env(safe-area-inset-top));right:14px;
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.14);color:#fff;font-size:26px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}

/* Menu button + scrim: desktop hides them, mobile uses them for the drawer */
.menu-btn{display:none}
.scrim{display:none}

/* ───────────── Mobile (Android + iOS) ───────────── */
@media(max-width:640px){
  /* Compact header so the title + progress fit narrow screens */
  header{padding:0 12px}
  .site-sub{display:none}
  .site-title{font-size:14px}
  .pct-lbl{font-size:18px}
  .pct-sub{font-size:9px}
  .bar-wrap{width:70px}
  .logo{gap:8px}

  .menu-btn{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:44px;flex-shrink:0;      /* 44px = Apple/Android min target */
    background:transparent;border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:16px;cursor:pointer;
  }

  /* Sidebar becomes a slide-in drawer instead of vanishing —
     stats, walks, layers and legend stay reachable on a phone. */
  .sidebar{
    position:fixed;top:52px;left:0;bottom:0;
    width:min(86vw,320px);z-index:1200;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:2px 0 24px rgba(0,0,0,.55);
    -webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .sidebar.open{transform:translateX(0)}
  .scrim{
    position:fixed;inset:52px 0 0 0;z-index:1150;
    background:rgba(0,0,0,.5);
  }
  .scrim.show{display:block}

  /* Touch targets: Apple/Android guidance is ~44px minimum */
  .tbtn{font-size:12px;padding:10px 14px;min-height:44px}
  .witem{padding:12px 12px;margin-bottom:6px;min-height:44px}
  .wname{font-size:13px}
  .wmeta{font-size:11px}
  .sval{font-size:18px}

  /* Filmstrip: a bit shorter so the map keeps room on small screens */
  .filmstrip{height:calc(96px + env(safe-area-inset-bottom))}
  .pthumb{height:76px}
}

/* Short landscape phones: shrink the strip further so the map isn't crushed */
@media(max-height:480px) and (max-width:900px){
  .filmstrip{height:calc(72px + env(safe-area-inset-bottom))}
  .pthumb{height:56px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loaderMsg">Loading walk data...</div>
  <div id="errBox"></div>
</div>

<header>
  <div class="logo">
    <button class="menu-btn" id="menuBtn" onclick="toggleDrawer()" aria-label="Show stats and walks">&#9776;</button>
    <span style="font-size:20px">&#x1F43E;</span>
    <div>
      <div class="site-title">Taiyo's Danville</div>
      <div class="site-sub">Every road. One walk at a time.</div>
    </div>
  </div>
  <div class="hprog">
    <div>
      <div class="pct-lbl" id="pctLbl">—</div>
      <div class="pct-sub" id="pctSub">&nbsp;</div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sb">
      <div class="sb-lbl">Progress</div>
      <div class="sgrid">
        <div class="sbox"><div class="sval g" id="sW">—</div><div class="sunit">miles walked</div></div>
        <div class="sbox"><div class="sval" id="sT">—</div><div class="sunit">total miles</div></div>
        <div class="sbox"><div class="sval g" id="sP">—</div><div class="sunit">% complete</div></div>
        <div class="sbox"><div class="sval" id="sR">—</div><div class="sunit">miles to go</div></div>
      </div>
    </div>
    <div class="sb">
      <div class="sb-lbl">Walks (<span id="wCount">0</span>)</div>
      <div id="wList"></div>
    </div>
    <div class="sb">
      <div class="sb-lbl">Layers</div>
      <div class="toggles">
        <button class="tbtn on" id="btnWalked"   onclick="tog('walked')">&#10003; Walked</button>
        <button class="tbtn on" id="btnUnwalked" onclick="tog('unwalked')">&#9675; Unwalked</button>
        <button class="tbtn on" id="btnTracks"   onclick="tog('tracks')">&#9641; Tracks</button>
        <button class="tbtn on" id="btnPhotos"   onclick="tog('photos')">&#128247; Photos</button>
      </div>
    </div>
    <div class="sb">
      <div class="sb-lbl">Legend</div>
      <div class="legend">
        <div class="litem"><div class="lline" style="background:#4ade9a"></div>Walked</div>
        <div class="litem"><div class="lline" style="background:#3a3d4a"></div>Not yet walked</div>
        <div class="litem"><div class="lline" style="background:#f0a500"></div>GPS track</div>
      </div>
    </div>
  </aside>
  <div class="mainarea">
    <div id="map"></div>
    <div class="filmstrip" id="filmstrip"></div>
  </div>
</div>

<div class="scrim" id="scrim" onclick="toggleDrawer(false)"></div>

<div id="lightbox" onclick="this.style.display='none'">
  <button class="lb-close" aria-label="Close photo">&times;</button>
  <img id="lbImg" src="" alt="">
  <div id="lbCap"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map, walkedG, unwalkedG, trackG, photoG;
var layerState = {walked:true, unwalked:true, tracks:true, photos:true};

function tog(name) {
  layerState[name] = !layerState[name];
  var id = 'btn' + name.charAt(0).toUpperCase() + name.slice(1);
  document.getElementById(id).classList.toggle('on', layerState[name]);
  var grp = name==='walked' ? walkedG : name==='unwalked' ? unwalkedG : name==='tracks' ? trackG : photoG;
  layerState[name] ? map.addLayer(grp) : map.removeLayer(grp);
}

function isMobile() { return window.innerWidth <= 640; }

// Mobile: the sidebar is a slide-in drawer. Pass true/false to force a state.
function toggleDrawer(force) {
  var sb = document.querySelector('.sidebar');
  var sc = document.getElementById('scrim');
  var open = (typeof force === 'boolean') ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  sc.classList.toggle('show', open);
}

function showError(msg) {
  document.getElementById('loaderMsg').style.display = 'none';
  var box = document.getElementById('errBox');
  box.style.display = 'block';
  box.innerHTML = msg;
}

function initMap() {
  map = L.map('map', {center:[37.8195,-121.978], zoom:14});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
  walkedG   = L.layerGroup().addTo(map);
  unwalkedG = L.layerGroup().addTo(map);
  trackG    = L.layerGroup().addTo(map);
  photoG    = L.layerGroup().addTo(map);
}

function openLightbox(p) {
  document.getElementById('lbImg').src = p.file;
  document.getElementById('lbCap').textContent = p.caption || p.date || '';
  document.getElementById('lightbox').style.display = 'flex';
}

function renderPhotos(photos) {
  if (!photos || !photos.length) return;
  var strip = document.getElementById('filmstrip');
  photos.forEach(function(p) {
    var t = document.createElement('img');
    t.className = 'pthumb';
    t.src = p.thumb;
    t.loading = 'lazy';
    t.alt = p.caption || '';
    t.title = p.caption || p.date || '';
    t.addEventListener('click', function() {
      if (p.lat != null && p.lon != null) map.setView([p.lat, p.lon], 16);
      openLightbox(p);
    });
    strip.appendChild(t);

    if (p.lat != null && p.lon != null) {
      var icon = L.divIcon({
        className: 'photopin',
        html: '<img src="' + p.thumb + '" alt="">',
        iconSize: [40, 40], iconAnchor: [20, 20]
      });
      var mk = L.marker([p.lat, p.lon], {icon: icon});
      mk.on('click', function() { openLightbox(p); });
      photoG.addLayer(mk);
    }
  });
}

function renderData(data) {
  var S = data.stats;

  // Stats
  document.getElementById('pctLbl').textContent = S.pct + '%';
  document.getElementById('pctSub').textContent = S.walked_miles.toFixed(1) + ' of ' + S.total_miles + ' mi';
  document.getElementById('sW').textContent = S.walked_miles.toFixed(1);
  document.getElementById('sT').textContent = S.total_miles;
  document.getElementById('sP').textContent = S.pct;
  document.getElementById('sR').textContent = S.miles_left.toFixed(1);
  document.getElementById('wCount').textContent = S.walk_count;
  setTimeout(function(){ document.getElementById('barFill').style.width = S.pct + '%'; }, 300);

  // Road segments — walked (green)
  data.walked_features.forEach(function(ft) {
    var p = ft.properties;
    var ll = ft.geometry.coordinates.map(function(c){return [c[1],c[0]];});
    var line = L.polyline(ll, {color:'#4ade9a', weight:3.5, opacity:0.9});
    line.bindPopup('<div class="pu-name">'+(p.n||'Unnamed')+'</div><div class="pu-meta">'+p.h+' &middot; '+p.mi+' mi<br><span class="pu-yes">&#10003; Walked</span></div>');
    walkedG.addLayer(line);
  });

  // Road segments — unwalked (dark)
  data.unwalked_features.forEach(function(ft) {
    var p = ft.properties;
    var ll = ft.geometry.coordinates.map(function(c){return [c[1],c[0]];});
    var line = L.polyline(ll, {color:'#3a3d4a', weight:2, opacity:0.55});
    line.bindPopup('<div class="pu-name">'+(p.n||'Unnamed')+'</div><div class="pu-meta">'+p.h+' &middot; '+p.mi+' mi<br>Not yet walked</div>');
    unwalkedG.addLayer(line);
  });

  // GPS tracks + walk list
  var wList = document.getElementById('wList');
  data.walks.forEach(function(walk) {
    var ll = walk.coords.map(function(c){return [c[1],c[0]];});
    var track = L.polyline(ll, {color:'#f0a500', weight:2.5, opacity:0.85});
    track.bindPopup('<div class="pu-name">'+walk.name+'</div><div class="pu-meta">'+walk.date+' &middot; '+walk.miles+' mi</div>');
    trackG.addLayer(track);

    var item = document.createElement('div');
    item.className = 'witem';
    item.innerHTML = '<div class="wname">'+walk.name+'</div><div class="wmeta">'+walk.date+' &middot; '+walk.miles+' mi</div>';
    item.addEventListener('click', function(){
      document.querySelectorAll('.witem').forEach(function(el){el.classList.remove('active');});
      item.classList.add('active');
      if (isMobile()) toggleDrawer(false);   // close drawer so the map is visible
      map.fitBounds(track.getBounds(), {padding:[40,40]});
      track.openPopup();
    });
    wList.appendChild(item);
  });

  // Hide loader
  document.getElementById('loader').style.display = 'none';
}

// Boot
initMap();

// Mobile: rotating the device or the address bar hiding changes the viewport —
// Leaflet must recompute its size or the map shows grey gaps.
window.addEventListener('resize', function() { if (map) map.invalidateSize(); });
window.addEventListener('orientationchange', function() {
  setTimeout(function() { if (map) map.invalidateSize(); }, 250);
});

// Cache-buster: GitHub Pages caches progress.json for up to 10 min, so append
// a unique timestamp to always fetch the freshest data after a new walk.
fetch('progress.json?t=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    renderData(data);
  })
  .catch(function(err) {
    showError(
      '<strong>Could not load progress.json</strong><br><br>' +
      'This map needs to be served from a local web server, not opened as a file://<br><br>' +
      'Quick fix &mdash; open a terminal in this folder and run:<br>' +
      '<code>python -m http.server 8000</code><br><br>' +
      'Then open: <a href="http://localhost:8000" style="color:#f0a500">http://localhost:8000</a><br><br>' +
      'Error: ' + err.message
    );
  });

// Photos are optional — a missing photos.json just means no gallery yet.
fetch('photos.json?t=' + Date.now())
  .then(function(r) { return r.ok ? r.json() : {photos: []}; })
  .then(function(d) { renderPhotos(d.photos || []); })
  .catch(function() { /* no photos yet — filmstrip stays hidden */ });
</script>
</body>
</html>
